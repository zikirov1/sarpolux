<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarpo Admin | Mahsulot Qo'shish</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --pink: #F48FB1; --dark: #2c3e50; --white: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #fffafa; display: flex; justify-content: center; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--white); display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s; }
        .heart-loader { width: 50px; height: 50px; background-color: var(--pink); transform: rotate(45deg); animation: heartBeat 1.2s infinite; position: relative; }
        .heart-loader::before, .heart-loader::after { content: ""; width: 50px; height: 50px; background-color: var(--pink); border-radius: 50%; position: absolute; }
        .heart-loader::before { top: -25px; left: 0; }
        .heart-loader::after { left: -25px; top: 0; }
        @keyframes heartBeat { 0%, 100% { transform: rotate(45deg) scale(0.8); } 50% { transform: rotate(45deg) scale(1); } }

        .container { width: 100%; max-width: 600px; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        h2 { color: var(--pink); text-align: center; letter-spacing: 3px; margin-bottom: 30px; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; font-family: inherit; }
        input:focus { border-color: var(--pink); }
        
        .btn { padding: 16px; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; font-size: 15px; transition: 0.3s; margin-bottom: 10px; }
        .btn-add { background: #fce4ec; color: var(--pink); border: 1px dashed var(--pink); }
        .btn-save { background: var(--dark); color: white; margin-top: 20px; }
        
        .variant-box { background: #fffcfd; border: 1px solid #fdf0f4; padding: 20px; border-radius: 20px; margin-top: 20px; position: relative; }
        .remove-btn { position: absolute; top: 10px; right: 10px; color: #ccc; cursor: pointer; font-size: 12px; }
        
        .gallery { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .img-card { width: 70px; height: 70px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--pink); color: white; padding: 12px 30px; border-radius: 50px; transition: 0.5s; z-index: 10001; box-shadow: 0 5px 15px rgba(244,143,177,0.3); }
        #toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div id="loader"><div class="heart-loader"></div></div>
<div id="toast">Xabar! ✨</div>

<div class="container">
    <div class="card">
        <h2>SARPO</h2>
        <input type="text" id="p-name" placeholder="Mahsulot nomi">
        <input type="number" id="p-price" placeholder="Asosiy narx (so'm)">
        
        <div id="variant-list"></div>
        
        <button class="btn btn-add" onclick="addVariant()">+ Rang va rasmlar qo'shish</button>
        <button class="btn btn-save" onclick="saveData()">BAZAGA SAQLASH</button>
    </div>
</div>

<script>
    // 1. Kirish paroli (2026)
    (function() {
        if (sessionStorage.getItem('sarpo_auth') !== 'true') {
            const entry = prompt("Parolni kiriting:");
            if (entry === "2026") {
                sessionStorage.setItem('sarpo_auth', 'true');
            } else {
                alert("Parol xato!");
                location.reload();
            }
        }
    })();

    // 2. Firebase Init
    const firebaseConfig = {
        apiKey: "AIzaSyCU5dmq2bL3G7kN0NGZfMirsrc_SuIKiQw",
        authDomain: "sarpolux.firebaseapp.com",
        projectId: "sarpolux",
        storageBucket: "sarpolux.firebasestorage.app",
        messagingSenderId: "928140641986",
        appId: "1:928140641986:web:1273454c1d99ab76d55d5b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 3. UI logic
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        }, 800);
    };

    function notify(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function addVariant() {
        const vId = Date.now();
        const div = document.createElement('div');
        div.className = 'variant-box';
        div.id = `v-${vId}`;
        div.innerHTML = `
            <span class="remove-btn" onclick="document.getElementById('v-${vId}').remove()">O'chirish</span>
            <input type="text" placeholder="Rang nomi (masalan: Oq)" class="v-color">
            <input type="file" multiple accept="image/*" onchange="preview(this, ${vId})" style="font-size:12px;">
            <div class="gallery" id="gal-${vId}"></div>
        `;
        document.getElementById('variant-list').appendChild(div);
    }

    function preview(input, vId) {
        const gal = document.getElementById(`gal-${vId}`);
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const d = document.createElement('div');
                d.className = 'img-card';
                d.innerHTML = `<img src="${e.target.result}">`;
                gal.appendChild(d);
            };
            reader.readAsDataURL(file);
        });
    }

    function saveData() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;

        if(!name || !price) {
            notify("Ma'lumotlarni to'ldiring! ⚠️");
            return;
        }

        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader').style.opacity = '1';

        const variants = [];
        document.querySelectorAll('.variant-box').forEach(vBox => {
            const color = vBox.querySelector('.v-color').value;
            const images = [];
            vBox.querySelectorAll('.img-card img').forEach(img => images.push(img.src));
            variants.push({ color, images });
        });

        db.collection("products").add({
            name: name,
            price: price,
            variants: variants,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            notify("Muvaffaqiyatli saqlandi! ✅");
            setTimeout(() => location.reload(), 1500);
        })
        .catch((err) => {
            console.error(err);
            notify("Xatolik yuz berdi! ❌");
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>

</body>
</html>
