<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarpo Admin | Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --pink: #F48FB1; --dark: #2c3e50; --white: #ffffff; --gap: 15px; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            background: #f8f9fa; 
            color: var(--dark);
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            width: 100%; 
            max-width: 500px; /* Mobil uchun optimal kenglik */
            margin: 0 auto;
            padding: var(--gap);
            box-sizing: border-box;
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        header h2 { color: var(--pink); margin: 0; letter-spacing: 3px; font-size: 24px; }

        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; /* Mobil klaviaturada zoom bo'lmasligi uchun kamida 16px */
            outline: none;
            background: #fafafa;
        }

        .btn { 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600; 
            font-size: 16px;
            transition: 0.2s active;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .btn-save { background: var(--pink); color: white; }
        .btn-add { background: #fff; color: var(--pink); border: 2px dashed var(--pink); margin-top: 10px; }

        /* Mahsulotlar Ro'yxati */
        .product-item { 
            display: flex; 
            align-items: center; 
            background: white; 
            padding: 12px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
            border: 1px solid #f0f0f0;
        }

        .product-item img { 
            width: 60px; 
            height: 60px; 
            border-radius: 12px; 
            object-fit: cover; 
            margin-right: 12px; 
        }

        .product-info { flex-grow: 1; }
        .product-info b { display: block; font-size: 15px; margin-bottom: 4px; }
        .product-info span { font-size: 13px; color: var(--pink); font-weight: 600; }

        .actions { display: flex; gap: 8px; }
        .btn-circle {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        /* Variantlar va Galereya */
        .variant-box { 
            background: #fffafa; 
            border: 1px solid #fce4ec; 
            padding: 15px; 
            border-radius: 15px; 
            margin-top: 15px; 
            position: relative;
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
            margin-top: 10px; 
        }

        .img-card { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #eee; 
            position: relative;
        }

        .img-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Loader */
        #loader { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 10000; 
        }

        .heart { width: 40px; height: 40px; background: var(--pink); transform: rotate(45deg); animation: beat 1.2s infinite; position: relative; }
        .heart:before, .heart:after { content: ""; width: 40px; height: 40px; background: var(--pink); border-radius: 50%; position: absolute; }
        .heart:before { top: -20px; left: 0; }
        .heart:after { left: -20px; top: 0; }
        @keyframes beat { 0%, 100% { transform: rotate(45deg) scale(0.8); } 50% { transform: rotate(45deg) scale(1.1); } }
    </style>
</head>
<body>

<div id="loader"><div class="heart"></div></div>

<div class="container">
    <header>
        <h2>SARPO ADMIN</h2>
    </header>

    <div class="card">
        <h3 id="form-title" style="margin-bottom: 15px; font-size: 18px;">Yangi Mahsulot</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="p-name" placeholder="Mahsulot nomi">
        <input type="number" id="p-price" placeholder="Narxi (so'm)">
        
        <div id="variant-list"></div>
        <button class="btn btn-add" onclick="addVariant()">+ Rang va Rasm qo'shish</button>
        
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn btn-save" onclick="saveData()" id="save-btn">SAQLASH</button>
            <button class="btn" style="display:none; background:#eee; color:#666;" id="cancel-btn" onclick="resetForm()">BEKOR QILISH</button>
        </div>
    </div>

    <h3 style="padding-left: 10px; font-size: 18px;">Mahsulotlar ro'yxati</h3>
    <div id="product-list-admin"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCU5dmq2bL3G7kN0NGZfMirsrc_SuIKiQw",
        authDomain: "sarpolux.firebaseapp.com",
        projectId: "sarpolux",
        storageBucket: "sarpolux.firebasestorage.app",
        messagingSenderId: "928140641986",
        appId: "1:928140641986:web:1273454c1d99ab76d55d5b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Ma'lumotlarni yuklash
    db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById('product-list-admin');
        list.innerHTML = "";
        snapshot.forEach((doc) => {
            const p = doc.data();
            const id = doc.id;
            const img = p.variants?.[0]?.images?.[0] || 'https://via.placeholder.com/60';
            
            list.innerHTML += `
                <div class="product-item">
                    <img src="${img}" alt="">
                    <div class="product-info">
                        <b>${p.name}</b>
                        <span>${Number(p.price).toLocaleString()} so'm</span>
                    </div>
                    <div class="actions">
                        <button class="btn-circle" style="background:#e3f2fd; color:#1976d2;" onclick="editProduct('${id}')">✏️</button>
                        <button class="btn-circle" style="background:#ffebee; color:#d32f2f;" onclick="deleteProduct('${id}')">🗑️</button>
                    </div>
                </div>
            `;
        });
    });

    function addVariant(data = null) {
        const vId = Date.now() + Math.random();
        const div = document.createElement('div');
        div.className = 'variant-box';
        div.id = `v-${vId}`;
        div.innerHTML = `
            <input type="text" placeholder="Rang nomi" class="v-color" value="${data?.color || ''}">
            <input type="file" multiple accept="image/*" onchange="preview(this, '${vId}')" id="file-${vId}" style="display:none">
            <button class="btn" style="background:white; border:1px solid #ddd; font-size:13px; padding:10px;" onclick="document.getElementById('file-${vId}').click()">📷 Rasmlarni tanlash</button>
            <div class="gallery" id="gal-${vId}">
                ${(data?.images || []).map(img => `<div class="img-card"><img src="${img}"></div>`).join('')}
            </div>
            <p onclick="document.getElementById('v-${vId}').remove()" style="color:#d32f2f; font-size:12px; text-align:right; margin:10px 0 0; cursor:pointer;">❌ O'chirish</p>
        `;
        document.getElementById('variant-list').appendChild(div);
    }

    function preview(input, vId) {
        const gal = document.getElementById(`gal-${vId}`);
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const d = document.createElement('div');
                d.className = 'img-card';
                d.innerHTML = `<img src="${e.target.result}">`;
                gal.appendChild(d);
            };
            reader.readAsDataURL(file);
        });
    }

    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        
        if(!name || !price) return alert("Nom va narxni kiriting!");

        document.getElementById('loader').style.display = 'flex';
        
        const variants = [];
        document.querySelectorAll('.variant-box').forEach(vBox => {
            const color = vBox.querySelector('.v-color').value;
            const images = [];
            vBox.querySelectorAll('.img-card img').forEach(img => images.push(img.src));
            if(color || images.length > 0) variants.push({ color, images });
        });

        const productData = {
            name, price, variants,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            if(id) {
                await db.collection("products").doc(id).update(productData);
            } else {
                productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("products").add(productData);
            }
            resetForm();
        } catch (e) { alert("Xatolik!"); }
        document.getElementById('loader').style.display = 'none';
    }

    async function editProduct(id) {
        const doc = await db.collection("products").doc(id).get();
        const p = doc.data();
        document.getElementById('edit-id').value = id;
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-price').value = p.price;
        document.getElementById('form-title').innerText = "Tahrirlash";
        document.getElementById('save-btn').innerText = "O'ZGARISHNI SAQLASH";
        document.getElementById('cancel-btn').style.display = "block";
        document.getElementById('variant-list').innerHTML = "";
        p.variants?.forEach(v => addVariant(v));
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function deleteProduct(id) {
        if(confirm("Ushbu mahsulot o'chirilsinmi?")) {
            await db.collection("products").doc(id).delete();
        }
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('p-name').value = "";
        document.getElementById('p-price').value = "";
        document.getElementById('variant-list').innerHTML = "";
        document.getElementById('form-title').innerText = "Yangi Mahsulot";
        document.getElementById('save-btn').innerText = "SAQLASH";
        document.getElementById('cancel-btn').style.display = "none";
    }
</script>
</body>
</html>
