<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarpo Admin | Boshqaruv</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --pink: #F48FB1; --dark: #2c3e50; --white: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #fffafa; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        h2, h3 { color: var(--dark); text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; }
        
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; transition: 0.3s; margin-bottom: 5px; }
        .btn-save { background: var(--pink); color: white; }
        .btn-add { background: #fce4ec; color: var(--pink); border: 1px dashed var(--pink); }
        .btn-edit { background: #3498db; color: white; width: auto; padding: 5px 15px; font-size: 12px; }
        .btn-delete { background: #e74c3c; color: white; width: auto; padding: 5px 15px; font-size: 12px; }

        /* Mahsulotlar Ro'yxati Stili */
        .product-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #f0f0f0; }
        .product-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .product-info { flex-grow: 1; }
        .product-info b { display: block; font-size: 14px; }
        .product-info span { font-size: 12px; color: #888; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .heart-loader { width: 30px; height: 30px; background-color: var(--pink); transform: rotate(45deg); animation: heartBeat 1.2s infinite; position: relative; }
        .heart-loader::before, .heart-loader::after { content: ""; width: 30px; height: 30px; background-color: var(--pink); border-radius: 50%; position: absolute; }
        .heart-loader::before { top: -15px; left: 0; }
        .heart-loader::after { left: -15px; top: 0; }
        @keyframes heartBeat { 0%, 100% { transform: rotate(45deg) scale(0.8); } 50% { transform: rotate(45deg) scale(1); } }

        .variant-box { background: #fffcfd; border: 1px solid #fdf0f4; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .gallery { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .img-card { width: 50px; height: 50px; border-radius: 5px; overflow: hidden; border: 1px solid #eee; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="loader"><div class="heart-loader"></div></div>

<div class="container">
    <div class="card">
        <h2 id="form-title">Yangi Mahsulot</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="p-name" placeholder="Mahsulot nomi">
        <input type="number" id="p-price" placeholder="Narxi (so'm)">
        
        <div id="variant-list"></div>
        <button class="btn btn-add" onclick="addVariant()">+ Rang qo'shish</button>
        <button class="btn btn-save" onclick="saveData()" id="save-btn">BAZAGA SAQLASH</button>
        <button class="btn" style="display:none; background:#95a5a6; color:white;" id="cancel-btn" onclick="resetForm()">BEKOR QILISH</button>
    </div>

    <div class="card">
        <h3>Barcha Mahsulotlar</h3>
        <div id="product-list-admin"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCU5dmq2bL3G7kN0NGZfMirsrc_SuIKiQw",
        authDomain: "sarpolux.firebaseapp.com",
        projectId: "sarpolux",
        storageBucket: "sarpolux.firebasestorage.app",
        messagingSenderId: "928140641986",
        appId: "1:928140641986:web:1273454c1d99ab76d55d5b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. Ma'lumotlarni Real-vaqtda yuklash
    db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById('product-list-admin');
        list.innerHTML = "";
        snapshot.forEach((doc) => {
            const p = doc.data();
            const id = doc.id;
            let img = p.variants?.[0]?.images?.[0] || "";
            
            list.innerHTML += `
                <div class="product-item">
                    <img src="${img || 'https://via.placeholder.com/50'}" alt="">
                    <div class="product-info">
                        <b>${p.name}</b>
                        <span>${Number(p.price).toLocaleString()} so'm</span>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="editProduct('${id}')">✏️</button>
                        <button class="btn-delete" onclick="deleteProduct('${id}')">🗑️</button>
                    </div>
                </div>
            `;
        });
    });

    function addVariant(data = null) {
        const vId = Date.now() + Math.random();
        const div = document.createElement('div');
        div.className = 'variant-box';
        div.id = `v-${vId}`;
        div.innerHTML = `
            <input type="text" placeholder="Rang nomi" class="v-color" value="${data?.color || ''}">
            <input type="file" multiple accept="image/*" onchange="preview(this, '${vId}')" style="font-size:10px">
            <div class="gallery" id="gal-${vId}">
                ${(data?.images || []).map(img => `<div class="img-card"><img src="${img}"></div>`).join('')}
            </div>
            <button onclick="document.getElementById('v-${vId}').remove()" style="color:red; background:none; border:none; font-size:10px; cursor:pointer">O'chirish</button>
        `;
        document.getElementById('variant-list').appendChild(div);
    }

    function preview(input, vId) {
        const gal = document.getElementById(`gal-${vId}`);
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const d = document.createElement('div');
                d.className = 'img-card';
                d.innerHTML = `<img src="${e.target.result}">`;
                gal.appendChild(d);
            };
            reader.readAsDataURL(file);
        });
    }

    // 2. Saqlash (Yangi yoki Tahrirlangan)
    async function saveData() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        
        if(!name || !price) return alert("To'ldiring!");

        document.getElementById('loader').style.display = 'flex';
        
        const variants = [];
        document.querySelectorAll('.variant-box').forEach(vBox => {
            const color = vBox.querySelector('.v-color').value;
            const images = [];
            vBox.querySelectorAll('.img-card img').forEach(img => images.push(img.src));
            variants.push({ color, images });
        });

        const productData = {
            name, price, variants,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!id) productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();

        try {
            if(id) {
                await db.collection("products").doc(id).update(productData);
            } else {
                await db.collection("products").add(productData);
            }
            resetForm();
        } catch (e) { alert("Xato!"); }
        document.getElementById('loader').style.display = 'none';
    }

    // 3. Tahrirlashga tayyorlash
    async function editProduct(id) {
        const doc = await db.collection("products").doc(id).get();
        const p = doc.data();
        
        document.getElementById('edit-id').value = id;
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-price').value = p.price;
        document.getElementById('form-title').innerText = "Tahrirlash";
        document.getElementById('save-btn').innerText = "O'ZGARISHNI SAQLASH";
        document.getElementById('cancel-btn').style.display = "block";
        
        document.getElementById('variant-list').innerHTML = "";
        p.variants?.forEach(v => addVariant(v));
        window.scrollTo(0, 0);
    }

    // 4. O'chirish
    async function deleteProduct(id) {
        if(confirm("Ushbu mahsulotni o'chirasizmi?")) {
            await db.collection("products").doc(id).delete();
        }
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('p-name').value = "";
        document.getElementById('p-price').value = "";
        document.getElementById('variant-list').innerHTML = "";
        document.getElementById('form-title').innerText = "Yangi Mahsulot";
        document.getElementById('save-btn').innerText = "BAZAGA SAQLASH";
        document.getElementById('cancel-btn').style.display = "none";
    }
</script>
</body>
</html>
